<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meal Prep Planner</title>
<style>
  :root{
    --bg:#0e1116; --bg-grad:radial-gradient(1200px 500px at 50% -10%, #16202b 0%, #0e1116 60%);
    --card:#171b22; --card-2:#1d232c; --ink:#e9ecf1; --muted:#8b94a3; --line:#262d38;
    --accent:#4cd684; --accent-ink:#0b2817; --accent-soft:rgba(76,214,132,.14);
    --bad:#f0716a; --bad-soft:rgba(240,113,106,.14);
    --warn:#e6b45a; --warn-soft:rgba(230,180,90,.14);
    --radius:16px; --shadow:0 1px 2px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.28);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f4f4f1; --bg-grad:none; --card:#ffffff; --card-2:#f7f7f5; --ink:#1d2129; --muted:#68707e; --line:#e4e3de;
      --accent:#217a4b; --accent-ink:#ffffff; --accent-soft:#e4f2e9;
      --bad:#b3413a; --bad-soft:#f8e9e7; --warn:#95661a; --warn-soft:#f7efdc;
      --shadow:0 1px 2px rgba(0,0,0,.06), 0 6px 18px rgba(0,0,0,.05);
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{color-scheme:dark light;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); background-image:var(--bg-grad); background-attachment:fixed; color:var(--ink); padding-bottom:86px; font-size:15px; line-height:1.45;}
  header{position:sticky; top:0; z-index:40; padding:14px 16px 10px; padding-top:calc(14px + env(safe-area-inset-top)); display:flex; align-items:center; justify-content:space-between; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); background:color-mix(in srgb, var(--bg) 78%, transparent); border-bottom:1px solid var(--line);}
  header h1{font-size:17px; margin:0; letter-spacing:-.01em; font-weight:800;}
  #syncBadge{font-size:11px; padding:4px 10px; border-radius:99px; background:var(--warn-soft); color:var(--warn); font-weight:700;}
  #syncBadge.on{background:var(--accent-soft); color:var(--accent);}
  main{padding:14px 12px 24px; max-width:640px; margin:0 auto;}
  nav{position:fixed; bottom:0; left:0; right:0; display:flex; gap:2px; background:color-mix(in srgb, var(--card) 88%, transparent); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-top:1px solid var(--line); padding:6px 8px calc(6px + env(safe-area-inset-bottom)); z-index:50;}
  nav button{flex:1; border:0; background:none; padding:7px 0 6px; font-size:10.5px; color:var(--muted); font-weight:700; cursor:pointer; border-radius:12px; transition:background .15s,color .15s;}
  nav button .ico{display:block; font-size:20px; margin-bottom:2px;}
  nav button.active{color:var(--accent); background:var(--accent-soft);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px; box-shadow:var(--shadow);}
  .card h3{margin:0 0 4px; font-size:16px; font-weight:700;}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .badge{font-size:11px; font-weight:700; padding:3.5px 9px; border-radius:99px; white-space:nowrap;}
  .b-ok{background:var(--accent-soft); color:var(--accent);}
  .b-bad{background:var(--bad-soft); color:var(--bad);}
  .b-tag{background:var(--card-2); color:var(--muted); font-weight:600; border:1px solid var(--line);}
  .b-warn{background:var(--warn-soft); color:var(--warn);}
  .muted{color:var(--muted); font-size:12.5px;}
  button.btn{border:1px solid var(--line); background:var(--card-2); border-radius:11px; padding:10px 15px; font-size:14px; font-weight:650; color:var(--ink); cursor:pointer; transition:transform .06s ease, filter .15s;}
  button.btn:active{transform:scale(.97);}
  button.btn.primary{background:var(--accent); border-color:var(--accent); color:var(--accent-ink);}
  button.btn.danger{color:var(--bad);}
  button.btn.sm{padding:6px 11px; font-size:12.5px; border-radius:9px;}
  button.btn.rate{font-size:16px; padding:6px 11px;}
  button.btn.rate.sel-up{background:var(--accent-soft); border-color:var(--accent);}
  button.btn.rate.sel-down{background:var(--bad-soft); border-color:var(--bad);}
  input,textarea,select{width:100%; border:1px solid var(--line); border-radius:11px; padding:11px 12px; font-size:16px; font-family:inherit; background:var(--card-2); color:var(--ink); outline:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  textarea{min-height:96px;}
  label{font-size:11px; font-weight:800; color:var(--muted); display:block; margin:12px 0 5px; text-transform:uppercase; letter-spacing:.06em;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;}
  @media (max-width:380px){ .grid3{grid-template-columns:1fr 1fr;} }
  .sectionTitle{font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:18px 6px 8px;}
  .gItem{display:flex; align-items:center; gap:12px; padding:11px 2px; border-bottom:1px solid var(--line); font-size:15px; min-height:44px;}
  .gItem:last-child{border-bottom:0;}
  .gItem input[type=checkbox]{width:23px; height:23px; accent-color:var(--accent); flex:none;}
  .gItem.done span.t{text-decoration:line-through; color:var(--muted);}
  .gItem .q{color:var(--muted); font-size:13px; margin-left:auto; flex:none;}
  .weekCard{display:flex; gap:12px; align-items:flex-start;}
  .weekCard input[type=checkbox]{width:25px; height:25px; accent-color:var(--accent); margin-top:2px; flex:none;}
  .toolbar{display:flex; gap:8px; margin:2px 0 12px;}
  .toolbar input{flex:1;}
  .progress{height:7px; border-radius:99px; background:var(--card-2); border:1px solid var(--line); overflow:hidden; flex:1;}
  .progress > div{height:100%; background:var(--accent); border-radius:99px; transition:width .25s ease;}
  dialog{border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:18px; width:min(560px, calc(100vw - 24px)); padding:18px; max-height:86vh; box-shadow:var(--shadow);}
  dialog::backdrop{background:rgba(0,0,0,.55); backdrop-filter:blur(3px);}
  .steps{font-size:14px; color:var(--ink); padding-left:18px; margin:6px 0;}
  .steps li{margin-bottom:4px;}
  .banner{border-radius:12px; padding:10px 12px; font-size:13px; margin-bottom:12px; background:var(--warn-soft); color:var(--warn); border:1px solid color-mix(in srgb, var(--warn) 30%, transparent);}
  .flex1{flex:1;}
  .right{margin-left:auto;}
  h4.sub{margin:14px 0 6px; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:800;}
</style>
</head>
<body>
<header>
  <h1>Meal Prep Planner</h1>
  <span id="syncBadge">local only</span>
</header>
<main id="view"></main>
<nav id="nav"></nav>

<dialog id="editDlg"></dialog>

<script>
/* ================= SEED (embedded fallback; source of truth is the backend) ================= */
const SEED_PREFS = {household:{people:["Jimmy","Partner"],adults:2},prepModel:{type:"weekly-meal-prep",cookDaysPerWeek:1,mealsCovered:["lunch"],defaultShape:{recipesPerWeek:2,servingsPerRecipe:4,totalServings:8}},macroTargets:{perServing:{protein_g_min:50,fiber_g_min:8},enforcement:"hard-floor",overrideAllowed:true,macroSource:"claude-estimated"},avoid:{hard:["turkey","spicy (chili heat of any kind)","nuts","seeds","corn and popcorn","tough skins and hulls"]},grocery:{store:"Haggen",sectionOrder:["produce","bakery","meat-seafood","dairy-eggs","grains-pasta","canned-dry","condiments-spices","frozen","other"]},carbBases:["rice","pasta","potatoes"],prepQuality:{mustHoldDaysRefrigerated:4},schemaVersion:1};

const SEED_RECIPES = [
{id:"r101",name:"Smoky BBQ Pulled Pork Bowls",status:"active",source:"rotation",servingsPerBatch:4,holdsDays:4,tags:["pork","bowl"],ingredients:[{qty:2.5,unit:"lb",item:"pork tenderloin",category:"meat-seafood",prepNote:"shredded after cooking"},{qty:1,unit:"cup",item:"mild smoky BBQ sauce",category:"condiments-spices",prepNote:"no-heat variety"},{qty:2,unit:"lb",item:"Yukon gold potatoes",category:"produce",prepNote:"peeled, cubed"},{qty:2,unit:"can",item:"baked beans (original, mild)",category:"canned-dry",prepNote:"15 oz cans"},{qty:1,unit:"lb",item:"green beans",category:"produce",prepNote:"cooked soft"},{qty:1,unit:"tsp",item:"smoked paprika (mild)",category:"condiments-spices",prepNote:""},{qty:1,unit:"tsp",item:"garlic powder",category:"condiments-spices",prepNote:""}],steps:["Season pork, slow cook or pressure cook until shreddable; shred and toss with BBQ sauce.","Roast peeled potato cubes. Warm baked beans. Steam green beans until soft.","Portion into 4 containers: potatoes, pork, beans, green beans."],macrosPerServing:{protein_g:66,fiber_g:11,calories:740,estimated:true},ratings:{},timesPrepped:0,lastPrepped:null,notes:""},
{id:"r102",name:"Salsa Verde Chicken Burrito Bowls",status:"active",source:"rotation",servingsPerBatch:4,holdsDays:4,tags:["chicken","bowl"],ingredients:[{qty:2.5,unit:"lb",item:"chicken breast",category:"meat-seafood",prepNote:""},{qty:1.5,unit:"cup",item:"mild salsa verde",category:"condiments-spices",prepNote:"blended smooth, no heat"},{qty:1.5,unit:"cup",item:"white rice (dry)",category:"grains-pasta",prepNote:""},{qty:2,unit:"can",item:"black beans",category:"canned-dry",prepNote:"rinsed, cooked soft"},{qty:1,unit:"cup",item:"shredded Mexican cheese",category:"dairy-eggs",prepNote:""},{qty:0.5,unit:"cup",item:"nonfat Greek yogurt",category:"dairy-eggs",prepNote:"crema swap"},{qty:1,unit:"bunch",item:"cilantro",category:"produce",prepNote:""},{qty:2,unit:"whole",item:"limes",category:"produce",prepNote:""}],steps:["Simmer or bake chicken in salsa verde until shreddable; shred in sauce.","Cook rice. Warm beans.","Portion: rice, beans, chicken, cheese. Yogurt and lime added on eating day."],macrosPerServing:{protein_g:71,fiber_g:9,calories:790,estimated:true},ratings:{},timesPrepped:0,lastPrepped:null,notes:""},
{id:"r103",name:"Korean-Style Beef and Veggie Bowls (Mild)",status:"active",source:"rotation",servingsPerBatch:4,holdsDays:4,tags:["beef","bowl"],ingredients:[{qty:2,unit:"lb",item:"93/7 ground beef",category:"meat-seafood",prepNote:""},{qty:0.25,unit:"cup",item:"low-sodium soy sauce",category:"condiments-spices",prepNote:""},{qty:3,unit:"tbsp",item:"brown sugar",category:"canned-dry",prepNote:""},{qty:1,unit:"tbsp",item:"toasted sesame oil",category:"condiments-spices",prepNote:"oil only, NO sesame seed garnish"},{qty:4,unit:"clove",item:"garlic",category:"produce",prepNote:"minced"},{qty:1,unit:"tbsp",item:"fresh ginger",category:"produce",prepNote:"grated"},{qty:1.5,unit:"cup",item:"white rice (dry)",category:"grains-pasta",prepNote:""},{qty:0.75,unit:"cup",item:"red lentils (dry)",category:"canned-dry",prepNote:"cooked into the rice"},{qty:3,unit:"whole",item:"carrots",category:"produce",prepNote:"shredded"},{qty:2,unit:"whole",item:"zucchini",category:"produce",prepNote:"peeled, diced"},{qty:2,unit:"cup",item:"shredded cabbage",category:"produce",prepNote:"cooked soft"}],steps:["Cook rice with red lentils in the same pot.","Brown beef; add garlic, ginger, soy, brown sugar, sesame oil. No heat.","Saute carrots, zucchini, cabbage until soft. Portion into 4 bowls."],macrosPerServing:{protein_g:53,fiber_g:8,calories:760,estimated:true},ratings:{},timesPrepped:0,lastPrepped:null,notes:"Closest to the macro floor. Bump lentils to 1 cup if fiber reads low."},
{id:"r104",name:"Garlic Lime Shrimp Pasta",status:"active",source:"rotation",servingsPerBatch:4,holdsDays:3,tags:["shrimp","pasta"],ingredients:[{qty:2.5,unit:"lb",item:"peeled deveined shrimp",category:"meat-seafood",prepNote:"thawed if frozen"},{qty:12,unit:"oz",item:"chickpea pasta (e.g., Banza)",category:"grains-pasta",prepNote:"carries the fiber floor"},{qty:6,unit:"clove",item:"garlic",category:"produce",prepNote:"minced"},{qty:3,unit:"whole",item:"limes",category:"produce",prepNote:"zest + juice"},{qty:3,unit:"tbsp",item:"butter",category:"dairy-eggs",prepNote:""},{qty:2,unit:"tbsp",item:"olive oil",category:"condiments-spices",prepNote:""},{qty:2,unit:"whole",item:"zucchini",category:"produce",prepNote:"peeled, diced"},{qty:1,unit:"bunch",item:"parsley",category:"produce",prepNote:"chopped"}],steps:["Boil chickpea pasta 2 min short of package time.","Saute zucchini, then shrimp with garlic in butter and oil; finish with lime.","Toss with pasta and parsley. Reheat gently so shrimp does not rubberize."],macrosPerServing:{protein_g:72,fiber_g:9,calories:750,estimated:true},ratings:{},timesPrepped:0,lastPrepped:null,notes:"Holds 3 days; eat these servings early in the week."},
{id:"r001",name:"Chicken and Red Lentil Rice Bowls",status:"suggested",source:"claude-starter",servingsPerBatch:4,holdsDays:4,tags:["chicken","bowl"],ingredients:[{qty:2.5,unit:"lb",item:"chicken breast",category:"meat-seafood",prepNote:"cubed"},{qty:1.5,unit:"cup",item:"red lentils (dry)",category:"canned-dry",prepNote:"cooked very soft"},{qty:1.5,unit:"cup",item:"white rice (dry)",category:"grains-pasta",prepNote:""},{qty:2,unit:"whole",item:"zucchini",category:"produce",prepNote:"peeled, diced"},{qty:3,unit:"whole",item:"carrots",category:"produce",prepNote:"peeled, diced"},{qty:2,unit:"tbsp",item:"olive oil",category:"condiments-spices",prepNote:""},{qty:1,unit:"tsp",item:"smoked paprika (mild)",category:"condiments-spices",prepNote:""},{qty:2,unit:"cup",item:"low-sodium chicken broth",category:"canned-dry",prepNote:""}],steps:["Cook rice. Simmer lentils in broth until fully soft.","Sear cubed chicken; roast zucchini and carrots until tender.","Portion into 4 containers."],macrosPerServing:{protein_g:72,fiber_g:12,calories:690,estimated:true},ratings:{},timesPrepped:0,lastPrepped:null,notes:"Claude starter suggestion. Delete freely."},
{id:"r002",name:"Lean Beef Chickpea Pasta Bake",status:"suggested",source:"claude-starter",servingsPerBatch:4,holdsDays:4,tags:["beef","pasta"],ingredients:[{qty:2,unit:"lb",item:"93/7 ground beef",category:"meat-seafood",prepNote:""},{qty:12,unit:"oz",item:"chickpea pasta (e.g., Banza)",category:"grains-pasta",prepNote:""},{qty:24,unit:"oz",item:"strained tomato sauce (passata, smooth)",category:"canned-dry",prepNote:"no skins or chunks"},{qty:1,unit:"cup",item:"part-skim mozzarella, shredded",category:"dairy-eggs",prepNote:""},{qty:0.5,unit:"cup",item:"grated parmesan",category:"dairy-eggs",prepNote:""},{qty:1,unit:"whole",item:"yellow onion",category:"produce",prepNote:"diced, cooked soft"},{qty:1,unit:"tsp",item:"Italian seasoning",category:"condiments-spices",prepNote:"no red pepper flake"}],steps:["Brown beef with onion. Add passata, simmer 15 min.","Boil pasta 2 min short.","Combine, top with cheese, bake at 400F. Portion into 4."],macrosPerServing:{protein_g:68,fiber_g:10,calories:780,estimated:true},ratings:{},timesPrepped:0,lastPrepped:null,notes:"Claude starter suggestion. Delete freely."}
];

/* ================= STATE ================= */
const LS_KEY = 'mealprep-v1';
const DEFAULT_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwmfGEikgqWQ8u7Bp0a2LIAhkqqsEJFKIox5B0YATqNiOKc3DlQRR9HPfig1HP5-Vxi/exec';
let state = load();
function load(){
  try{
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if(s && s.recipes){ if(!s.endpoint) s.endpoint = DEFAULT_ENDPOINT; return s; }
  }catch(e){}
  return {endpoint:DEFAULT_ENDPOINT, recipes:structuredClone(SEED_RECIPES), plans:[], prefs:structuredClone(SEED_PREFS), tab:'recipes', week:nextMonday(), search:''};
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function nextMonday(){
  const d=new Date(); const day=d.getDay(); const add=(8-day)%7||7;
  const m=new Date(d); m.setDate(d.getDate()+ (day===1?0:add));
  return m.toISOString().slice(0,10);
}
const floorP = ()=> state.prefs?.macroTargets?.perServing?.protein_g_min ?? 50;
const floorF = ()=> state.prefs?.macroTargets?.perServing?.fiber_g_min ?? 8;
const people = ()=> state.prefs?.household?.people ?? ['Jimmy','Partner'];
const sections = ()=> state.prefs?.grocery?.sectionOrder ?? ['produce','bakery','meat-seafood','dairy-eggs','grains-pasta','canned-dry','condiments-spices','frozen','other'];
function meetsFloor(r){ const m=r.macrosPerServing||{}; return (m.protein_g||0)>=floorP() && (m.fiber_g||0)>=floorF(); }
function currentPlan(){ return state.plans.find(p=>p.weekOf===state.week); }

/* ================= SYNC ================= */
async function api(action, payload){
  if(!state.endpoint) return null;
  const res = await fetch(state.endpoint, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({action, payload})});
  const j = await res.json();
  if(j && j.error) throw new Error(j.error);
  return j;
}
async function pullAll(silent){
  if(!state.endpoint) return;
  try{
    const d = await api('getAll',{});
    if(d.recipes && d.recipes.length) state.recipes = d.recipes;
    if(d.plans) state.plans = d.plans;
    if(d.prefs) state.prefs = d.prefs;
    state.online = true; save(); render();
  }catch(e){ state.online=false; render(); if(!silent) alert('Could not reach backend: '+e.message); }
}
function pushRecipe(r){ api('saveRecipe', r).catch(e=>console.warn('sync',e)); }
function pushPlan(p){ api('savePlan', p).catch(e=>console.warn('sync',e)); }

/* ================= RENDER ================= */
const TABS=[['recipes','📖','Recipes'],['week','🗓️','This Week'],['grocery','🛒','Grocery'],['settings','⚙️','Settings']];
function render(){
  document.getElementById('nav').innerHTML = TABS.map(([id,ico,lbl])=>
    `<button class="${state.tab===id?'active':''}" onclick="go('${id}')"><span class="ico">${ico}</span>${lbl}</button>`).join('');
  const badge=document.getElementById('syncBadge');
  if(state.endpoint && state.online){ badge.textContent='synced'; badge.className='on'; }
  else if(state.endpoint){ badge.textContent='offline'; badge.className=''; }
  else { badge.textContent='local only'; badge.className=''; }
  const v=document.getElementById('view');
  if(state.tab==='recipes') v.innerHTML=viewRecipes();
  else if(state.tab==='week') v.innerHTML=viewWeek();
  else if(state.tab==='grocery') v.innerHTML=viewGrocery();
  else v.innerHTML=viewSettings();
}
function go(t){ state.tab=t; save(); render(); }

/* ---- Recipes ---- */
function viewRecipes(){
  const q=(state.search||'').toLowerCase();
  const list=state.recipes.filter(r=>r.status!=='retired').filter(r=>!q||r.name.toLowerCase().includes(q)||(r.tags||[]).join(' ').includes(q));
  const demo = !state.endpoint ? `<div class="banner">Local mode: changes stay on this device until a backend URL is set in Settings.</div>` : '';
  return demo+`
  <div class="toolbar">
    <input placeholder="Search recipes..." value="${esc(state.search||'')}" oninput="state.search=this.value;save();render()">
    <button class="btn primary" onclick="openEdit()">+ Add</button>
  </div>
  ${list.map(cardRecipe).join('')||'<p class="muted">No recipes match.</p>'}`;
}
function cardRecipe(r){
  const m=r.macrosPerServing||{};
  const ok=meetsFloor(r);
  const rate=(person)=>{
    const v=(r.ratings||{})[person];
    return `<span class="muted" style="font-size:11px">${esc(person)}</span>
      <button class="btn rate ${v==='up'?'sel-up':''}" onclick="rate('${r.id}','${esc(person)}','up')">👍</button>
      <button class="btn rate ${v==='down'?'sel-down':''}" onclick="rate('${r.id}','${esc(person)}','down')">👎</button>`;
  };
  return `<div class="card">
    <div class="row">
      <h3 class="flex1">${esc(r.name)}</h3>
      ${r.status==='suggested'?'<span class="badge b-warn">suggested</span>':''}
    </div>
    <div class="row" style="margin:6px 0">
      <span class="badge ${ (m.protein_g||0)>=floorP()?'b-ok':'b-bad'}">${m.protein_g??'?'}g protein</span>
      <span class="badge ${ (m.fiber_g||0)>=floorF()?'b-ok':'b-bad'}">${m.fiber_g??'?'}g fiber</span>
      <span class="badge b-tag">${m.calories??'?'} cal</span>
      <span class="badge b-tag">holds ${r.holdsDays||4}d</span>
      ${m.estimated?'<span class="badge b-tag" title="Claude estimate">est.</span>':''}
      ${ok?'':'<span class="badge b-bad">under target</span>'}
    </div>
    <div class="row">${(r.tags||[]).map(t=>`<span class="badge b-tag">${esc(t)}</span>`).join('')}</div>
    ${r.notes?`<p class="muted" style="margin:6px 0 0">${esc(r.notes)}</p>`:''}
    <div class="row" style="margin-top:10px">
      ${rate(people()[0])} ${rate(people()[1]||'Partner')}
      <span class="right"></span>
      <button class="btn sm" onclick="openEdit('${r.id}')">Edit</button>
      <button class="btn sm" onclick="toggleDetail('${r.id}')">Details</button>
    </div>
    <div id="det-${r.id}" style="display:none; margin-top:10px">
      <h4 class="sub">Ingredients (${r.servingsPerBatch||4} servings)</h4>
      ${(r.ingredients||[]).map(i=>`<div class="gItem"><span class="t">${esc(i.item)}${i.prepNote?` <span class="muted">(${esc(i.prepNote)})</span>`:''}</span><span class="q">${i.qty} ${esc(i.unit)}</span></div>`).join('')}
      <h4 class="sub">Steps</h4>
      <ol class="steps">${(r.steps||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ol>
      <div class="row" style="margin-top:8px">
        <button class="btn sm danger" onclick="retire('${r.id}')">Retire recipe</button>
      </div>
    </div>
  </div>`;
}
function toggleDetail(id){ const el=document.getElementById('det-'+id); el.style.display= el.style.display==='none'?'block':'none'; }
function rate(id,person,val){
  const r=state.recipes.find(x=>x.id===id); if(!r) return;
  r.ratings=r.ratings||{};
  r.ratings[person]= r.ratings[person]===val? null : val;
  save(); render(); pushRecipe(r);
}
function retire(id){
  if(!confirm('Retire this recipe? It hides from the library but keeps its history.')) return;
  const r=state.recipes.find(x=>x.id===id); r.status='retired'; save(); render(); pushRecipe(r);
}

/* ---- Edit dialog ---- */
function openEdit(id){
  const r = id? state.recipes.find(x=>x.id===id) : {id:'r'+Date.now(), name:'', status:'active', servingsPerBatch:4, holdsDays:4, tags:[], ingredients:[], steps:[], macrosPerServing:{estimated:false}, ratings:{}, notes:''};
  const ingText=(r.ingredients||[]).map(i=>`${i.qty} ${i.unit} ${i.item} | ${i.category}${i.prepNote?' | '+i.prepNote:''}`).join('\n');
  const dlg=document.getElementById('editDlg');
  dlg.innerHTML=`
    <h3 style="margin:0 0 4px">${id?'Edit':'New'} recipe</h3>
    <p class="muted" style="margin:0">Macro floor: ${floorP()}g protein, ${floorF()}g fiber per serving. Ask Claude to estimate macros for new recipes.</p>
    <label>Name</label><input id="f-name" value="${esc(r.name)}">
    <div class="grid3">
      <div><label>Servings/batch</label><input id="f-serv" type="number" value="${r.servingsPerBatch||4}"></div>
      <div><label>Holds (days)</label><input id="f-hold" type="number" value="${r.holdsDays||4}"></div>
      <div><label>Status</label><select id="f-status">
        ${['active','suggested','retired'].map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="grid3">
      <div><label>Protein g</label><input id="f-p" type="number" value="${r.macrosPerServing?.protein_g??''}"></div>
      <div><label>Fiber g</label><input id="f-f" type="number" value="${r.macrosPerServing?.fiber_g??''}"></div>
      <div><label>Calories</label><input id="f-c" type="number" value="${r.macrosPerServing?.calories??''}"></div>
    </div>
    <label>Tags (comma separated)</label><input id="f-tags" value="${esc((r.tags||[]).join(', '))}">
    <label>Ingredients, one per line: qty unit item | section | note</label>
    <textarea id="f-ing" placeholder="2.5 lb chicken breast | meat-seafood | cubed">${esc(ingText)}</textarea>
    <p class="muted">Sections: ${sections().join(', ')}</p>
    <label>Steps (one per line)</label><textarea id="f-steps">${esc((r.steps||[]).join('\n'))}</textarea>
    <label>Notes</label><input id="f-notes" value="${esc(r.notes||'')}">
    <div class="row" style="margin-top:14px; justify-content:flex-end">
      <button class="btn" onclick="editDlg.close()">Cancel</button>
      <button class="btn primary" onclick="saveEdit('${r.id}', ${id?'true':'false'})">Save</button>
    </div>`;
  dlg.showModal();
}
function saveEdit(id, existed){
  const g=x=>document.getElementById(x).value;
  const ings=g('f-ing').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const parts=l.split('|').map(s=>s.trim());
    const m=parts[0].match(/^([\d.\/]+)\s+(\S+)\s+(.+)$/);
    return { qty: m?parseFloat(m[1]):1, unit: m?m[2]:'x', item: m?m[3]:parts[0], category: parts[1]||'other', prepNote: parts[2]||'' };
  });
  const rec={
    id, name:g('f-name').trim(), status:g('f-status'),
    servingsPerBatch:+g('f-serv')||4, holdsDays:+g('f-hold')||4,
    tags:g('f-tags').split(',').map(s=>s.trim()).filter(Boolean),
    ingredients:ings, steps:g('f-steps').split('\n').map(s=>s.trim()).filter(Boolean),
    macrosPerServing:{protein_g:+g('f-p')||null, fiber_g:+g('f-f')||null, calories:+g('f-c')||null, estimated:false},
    notes:g('f-notes'), source: existed? (state.recipes.find(x=>x.id===id)?.source||'app') : 'app',
    ratings: existed? (state.recipes.find(x=>x.id===id)?.ratings||{}) : {},
    timesPrepped: existed? (state.recipes.find(x=>x.id===id)?.timesPrepped||0) : 0,
    lastPrepped: existed? (state.recipes.find(x=>x.id===id)?.lastPrepped||null) : null
  };
  if(!rec.name){ alert('Name required'); return; }
  const i=state.recipes.findIndex(x=>x.id===id);
  if(i>=0) state.recipes[i]=rec; else state.recipes.push(rec);
  save(); document.getElementById('editDlg').close(); render(); pushRecipe(rec);
}

/* ---- This Week ---- */
function viewWeek(){
  const plan=currentPlan()||{weekOf:state.week, recipeIds:[], override:false, groceryChecked:{}, extras:[]};
  const shape=state.prefs?.prepModel?.defaultShape||{recipesPerWeek:2,servingsPerRecipe:4,totalServings:8};
  const active=state.recipes.filter(r=>r.status!=='retired');
  const chosen=plan.recipeIds.length;
  const servings=plan.recipeIds.reduce((n,id)=>n+((state.recipes.find(r=>r.id===id)||{}).servingsPerBatch||4),0);
  return `
  <div class="card">
    <label>Week of (cook day / Monday)</label>
    <input type="date" value="${state.week}" onchange="state.week=this.value;save();render()">
    <div class="row" style="margin-top:10px">
      <span class="badge ${chosen===shape.recipesPerWeek?'b-ok':'b-warn'}">${chosen}/${shape.recipesPerWeek} recipes</span>
      <span class="badge ${servings>=shape.totalServings?'b-ok':'b-warn'}">${servings}/${shape.totalServings} servings</span>
    </div>
  </div>
  ${active.map(r=>{
    const sel=plan.recipeIds.includes(r.id);
    const ok=meetsFloor(r);
    const blocked=!ok && !plan.override;
    return `<div class="card weekCard">
      <input type="checkbox" ${sel?'checked':''} ${blocked&&!sel?'disabled':''} onchange="toggleWeek('${r.id}')">
      <div class="flex1">
        <strong>${esc(r.name)}</strong>
        <div class="row" style="margin-top:4px">
          <span class="badge ${ok?'b-ok':'b-bad'}">${r.macrosPerServing?.protein_g??'?'}p / ${r.macrosPerServing?.fiber_g??'?'}f</span>
          <span class="badge b-tag">${r.servingsPerBatch||4} servings</span>
          <span class="badge b-tag">holds ${r.holdsDays||4}d</span>
          ${ok?'':'<span class="badge b-bad">under macro floor</span>'}
        </div>
      </div>
    </div>`;
  }).join('')}
  <div class="card">
    <div class="row">
      <input type="checkbox" id="ovr" ${plan.override?'checked':''} onchange="setOverride(this.checked)" style="width:20px;height:20px">
      <span style="font-size:14px">Allow under-target recipes this week (override)</span>
    </div>
  </div>
  <button class="btn primary" style="width:100%" onclick="go('grocery')">Build grocery list →</button>`;
}
function toggleWeek(id){
  let plan=currentPlan();
  if(!plan){ plan={weekOf:state.week, recipeIds:[], override:false, groceryChecked:{}, extras:[]}; state.plans.push(plan); }
  const i=plan.recipeIds.indexOf(id);
  if(i>=0) plan.recipeIds.splice(i,1); else plan.recipeIds.push(id);
  save(); render(); pushPlan(plan);
}
function setOverride(v){
  let plan=currentPlan();
  if(!plan){ plan={weekOf:state.week, recipeIds:[], override:v, groceryChecked:{}, extras:[]}; state.plans.push(plan); }
  plan.override=v; save(); render(); pushPlan(plan);
}

/* ---- Grocery ---- */
function viewGrocery(){
  const plan=currentPlan();
  if(!plan||!plan.recipeIds.length) return `<div class="card"><p class="muted">No recipes selected for the week of ${state.week}. Pick them in This Week.</p></div>`;
  const items={};
  plan.recipeIds.forEach(id=>{
    const r=state.recipes.find(x=>x.id===id); if(!r) return;
    (r.ingredients||[]).forEach(i=>{
      const key=(i.item+'|'+i.unit).toLowerCase();
      if(items[key]) items[key].qty+=i.qty;
      else items[key]={...i};
    });
  });
  (plan.extras||[]).forEach((x,n)=>{ items['extra'+n]={qty:'',unit:'',item:x,category:'other',extra:true}; });
  const byCat={};
  Object.entries(items).forEach(([key,i])=>{ (byCat[i.category]=byCat[i.category]||[]).push([key,i]); });
  const keys=Object.keys(items);
  const doneCount=keys.filter(k=>(plan.groceryChecked||{})[k]).length;
  const pct=keys.length?Math.round(doneCount/keys.length*100):0;
  return `
  <div class="card">
    <div class="row"><strong class="flex1">Week of ${plan.weekOf} · ${state.prefs?.grocery?.store||'store'}</strong>
    <span class="badge ${doneCount===keys.length&&keys.length?'b-ok':'b-tag'}">${doneCount}/${keys.length}</span></div>
    <div class="row" style="margin-top:10px"><div class="progress"><div style="width:${pct}%"></div></div></div>
  </div>
  ${sections().filter(c=>byCat[c]).map(c=>`
    <div class="sectionTitle">${c.replace('-',' & ')}</div>
    <div class="card">
      ${byCat[c].map(([key,i])=>{
        const done=(plan.groceryChecked||{})[key];
        return `<div class="gItem ${done?'done':''}">
          <input type="checkbox" ${done?'checked':''} onchange="checkItem('${esc(key)}',this.checked)">
          <span class="t">${esc(i.item)}${i.prepNote?` <span class="muted">(${esc(i.prepNote)})</span>`:''}</span>
          <span class="q">${i.qty?fmtQty(i.qty)+' '+esc(i.unit):''}</span>
        </div>`;
      }).join('')}
    </div>`).join('')}
  <div class="card row">
    <input id="extraItem" placeholder="Add extra item (coffee, bananas...)" class="flex1">
    <button class="btn" onclick="addExtra()">Add</button>
  </div>`;
}
function fmtQty(q){ return Math.round(q*100)/100; }
function checkItem(key,val){
  const plan=currentPlan(); if(!plan) return;
  plan.groceryChecked=plan.groceryChecked||{};
  plan.groceryChecked[key]=val; save(); render(); pushPlan(plan);
}
function addExtra(){
  const v=document.getElementById('extraItem').value.trim(); if(!v) return;
  const plan=currentPlan(); plan.extras=plan.extras||[]; plan.extras.push(v);
  save(); render(); pushPlan(plan);
}

/* ---- Settings ---- */
function viewSettings(){
  return `
  <div class="card">
    <h3>Backend sync</h3>
    <p class="muted">Paste the Apps Script /exec URL. Both phones use the same URL to share one library.</p>
    <label>Endpoint URL</label>
    <input id="s-url" value="${esc(state.endpoint||'')}" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="row" style="margin-top:10px">
      <button class="btn" onclick="saveEndpoint()">Save</button>
      <button class="btn" onclick="testConn()">Test connection</button>
      <button class="btn" onclick="pullAll(false)">Pull latest</button>
    </div>
  </div>
  <div class="card">
    <h3>Seed / backup</h3>
    <div class="row" style="margin-top:6px">
      <button class="btn" onclick="pushSeed(false)">Push seed data</button>
      <button class="btn danger" onclick="pushSeed(true)">Force reseed</button>
      <button class="btn" onclick="exportJson()">Export JSON</button>
    </div>
    <p class="muted" style="margin-top:8px">Push seed loads this app's built-in data into an empty backend. Force reseed overwrites everything in the Sheet. Export downloads a full backup of what this device sees.</p>
  </div>
  <div class="card">
    <h3>House rules</h3>
    <p class="muted">Floor: ${floorP()}g protein / ${floorF()}g fiber per serving. Avoids: ${(state.prefs?.avoid?.hard||[]).join('; ')}. Edit prefs via Claude or the Sheet.</p>
  </div>`;
}
function saveEndpoint(){ state.endpoint=document.getElementById('s-url').value.trim(); save(); render(); if(state.endpoint) pullAll(true); }
async function testConn(){
  saveEndpoint();
  try{ const d=await api('getAll',{}); alert('Connected. Backend has '+ (d.recipes||[]).length +' recipes.'); state.online=true; render(); }
  catch(e){ alert('Failed: '+e.message); }
}
async function pushSeed(force){
  if(!state.endpoint){ alert('Set the endpoint URL first.'); return; }
  if(force && !confirm('Overwrite EVERYTHING in the backend with the current data on this device?')) return;
  try{
    const out=await api('seedAll',{force, recipes:{recipes:state.recipes}, plans:{weeks:state.plans}, prefs:state.prefs});
    alert('Seeded: '+JSON.stringify(out.seeded||out));
    pullAll(true);
  }catch(e){ alert('Seed failed: '+e.message); }
}
function exportJson(){
  const blob=new Blob([JSON.stringify({prefs:state.prefs, recipes:state.recipes, plans:state.plans},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='meal-planner-backup.json'; a.click();
}

/* ---- utils ---- */
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

render();
if(state.endpoint) pullAll(true);
</script>
</body>
</html>
